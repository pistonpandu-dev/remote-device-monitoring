apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: remote-monitor-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
  - host: remote-monitor.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: remote-monitor-service
            port:
              number: 80
  tls:
  - hosts:
    - remote-monitor.example.com
    secretName: tls-secret
